name: CampusQuest Go - CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ============================================================
  # Stage 1: Test all services
  # ============================================================
  test-services:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: services/fitness-sync-service/package.json

      - name: Install fitness-sync dependencies
        run: npm ci
        working-directory: services/fitness-sync-service

      - name: Run fitness-sync unit tests
        run: npm test -- --ci --passWithNoTests
        working-directory: services/fitness-sync-service

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fitness-coverage
          path: services/fitness-sync-service/coverage/

  # ============================================================
  # Stage 2: Security Scanning (Member B responsibility)
  # ============================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: test-services
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          if grep -rn "password\s*=\s*['\"][^$]" services/ --include="*.js" | grep -v "campusquest_pass\|password_hash\|DB_PASSWORD"; then
            echo "WARNING: Possible hardcoded password found"
          else
            echo "✅ No hardcoded secrets detected"
          fi

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --severity-threshold=high

      - name: Run npm audit
        run: |
          cd services/fitness-sync-service && npm audit --audit-level=high || true
          cd ../merchant-stall-service && npm audit --audit-level=high || true
          cd ../geolocation-service && npm audit --audit-level=high || true
          cd ../rewards-store-service && npm audit --audit-level=high || true

  # ============================================================
  # Stage 3: Build Docker images
  # ============================================================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-services, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build fitness-sync image
        uses: docker/build-push-action@v5
        with:
          context: ./services/fitness-sync-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/fitness-sync:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/fitness-sync:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build merchant-stall image
        uses: docker/build-push-action@v5
        with:
          context: ./services/merchant-stall-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/merchant-stall:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/merchant-stall:latest

      - name: Build geolocation image
        uses: docker/build-push-action@v5
        with:
          context: ./services/geolocation-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/geolocation:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/geolocation:latest

      - name: Build rewards-store image
        uses: docker/build-push-action@v5
        with:
          context: ./services/rewards-store-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/rewards-store:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/rewards-store:latest

  # ============================================================
  # Stage 4: Integration Tests (Member C responsibility)
  # ============================================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-services
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: campusquest_db
          POSTGRES_USER: campusquest_user
          POSTGRES_PASSWORD: campusquest_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Initialize database
        run: |
          PGPASSWORD=campusquest_pass psql -h localhost -U campusquest_user -d campusquest_db -f init.sql
        env:
          PGPASSWORD: campusquest_pass

      - name: Start services
        run: |
          cd services/fitness-sync-service && npm ci && PORT=3001 DB_HOST=localhost node src/index.js &
          cd services/merchant-stall-service && npm ci && PORT=3002 DB_HOST=localhost node src/index.js &
          cd services/geolocation-service && npm ci && PORT=3003 DB_HOST=localhost node src/index.js &
          cd services/rewards-store-service && npm ci && PORT=3004 DB_HOST=localhost node src/index.js &
          sleep 10
        env:
          DB_HOST: localhost
          DB_USER: campusquest_user
          DB_PASSWORD: campusquest_pass
          DB_NAME: campusquest_db

      - name: Run health checks
        run: |
          curl -f http://localhost:3001/health || exit 1
          curl -f http://localhost:3002/health || exit 1
          curl -f http://localhost:3003/health || exit 1
          curl -f http://localhost:3004/health || exit 1
          echo "✅ All services healthy"

      - name: Install test dependencies
        run: npm ci
        working-directory: integration-tests

      - name: Run integration tests
        run: npm test
        working-directory: integration-tests
        env:
          FITNESS_URL: http://localhost:3001
          MERCHANT_URL: http://localhost:3002
          GEO_URL: http://localhost:3003
          REWARDS_URL: http://localhost:3004

  # ============================================================
  # Stage 5: Deploy to Staging (Member D responsibility)
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-docker, integration-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging server via Ansible
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "Ansible deployment would run here."
          echo "ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/deploy.yml -e deployment_env=staging"
        # Uncomment below for real Ansible deployment:
        # uses: dawidd6/action-ansible-playbook@v2
        # with:
        #   playbook: ansible/playbooks/deploy.yml
        #   inventory: ansible/inventory/hosts.yml
        #   key: ${{ secrets.DEPLOY_KEY }}
        #   options: -e deployment_env=staging

  # ============================================================
  # Stage 6: Notify
  # ============================================================
  notify:
    name: Notify on Success
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Post deployment summary
        run: |
          echo "============================================"
          echo "✅ CampusQuest Go CI/CD Pipeline Complete"
          echo "============================================"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Status: ${{ needs.deploy-staging.result }}"
