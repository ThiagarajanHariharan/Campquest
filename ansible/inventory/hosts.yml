---
all:
  children:
    development:
      hosts:
        localhost:
          ansible_connection: local
      vars:
        deployment_env: development
        app_port_fitness: 3001
        app_port_merchant: 3002
        app_port_geo: 3003
        app_port_rewards: 3004
        app_port_frontend: 3000

    staging:
      hosts:
        staging_server:
          ansible_host: YOUR_STAGING_IP_HERE
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/deploy_key
      vars:
        deployment_env: staging
        app_dir: /opt/campusquest-go

    production:
      hosts:
        production_server:
          ansible_host: YOUR_PRODUCTION_IP_HERE
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/deploy_key
      vars:
        deployment_env: production
        app_dir: /opt/campusquest-go

  vars:
    # Database configuration
    db_name: campusquest_db
    db_user: campusquest_user
    db_password: "{{ lookup('env', 'DB_PASSWORD') | default('campusquest_pass', true) }}"

    # Service ports
    app_port_fitness: 3001
    app_port_merchant: 3002
    app_port_geo: 3003
    app_port_rewards: 3004
    app_port_frontend: 3000
    db_port: 5432

    # Canteen coordinates (update for your school!)
    canteen_coordinates:
      - name: "North Canteen"
        lat: 1.3429
        lon: 103.6818
      - name: "South Canteen"
        lat: 1.3415
        lon: 103.6830
      - name: "Central Food Court"
        lat: 1.3422
        lon: 103.6824
