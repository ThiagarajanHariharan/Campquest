---
# ============================================================
# CampusQuest Go - Ansible Deployment Playbook (Member D)
# ============================================================
- name: Deploy CampusQuest Go
  hosts: "{{ deployment_env | default('development') }}"
  become: yes
  vars:
    app_dir: /opt/campusquest-go
    backup_dir: /opt/campusquest-go/backups

  tasks:
    # ---- Prerequisites ----
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == 'Debian'

    - name: Install required packages
      package:
        name:
          - git
          - curl
          - wget
          - python3-pip
        state: present

    - name: Install Docker
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Install Docker Compose
      get_url:
        url: "https://github.com/docker/compose/releases/download/v2.23.0/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    # ---- Application Setup ----
    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Create backup directory
      file:
        path: "{{ backup_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        mode: '0755'

    - name: Copy application files
      synchronize:
        src: "{{ playbook_dir }}/../../"
        dest: "{{ app_dir }}/"
        delete: yes
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=.git"
          - "--exclude=*.log"

    - name: Create environment file
      template:
        src: "{{ playbook_dir }}/templates/.env.j2"
        dest: "{{ app_dir }}/.env"
        owner: "{{ ansible_user }}"
        mode: '0600'
      ignore_errors: yes

    - name: Write .env directly
      copy:
        content: |
          DB_NAME={{ db_name }}
          DB_USER={{ db_user }}
          DB_PASSWORD={{ db_password }}
          NODE_ENV={{ deployment_env }}
        dest: "{{ app_dir }}/.env"
        owner: "{{ ansible_user }}"
        mode: '0600'

    # ---- Database Initialization ----
    - name: Start database first
      shell: docker-compose up -d postgres
      args:
        chdir: "{{ app_dir }}"

    - name: Wait for database to be ready
      wait_for:
        host: localhost
        port: 5432
        delay: 5
        timeout: 60

    - name: Run database initialization
      shell: |
        docker exec campusquest_db psql -U {{ db_user }} -d {{ db_name }} -f /docker-entrypoint-initdb.d/init.sql
      ignore_errors: yes

    # ---- Deploy All Services ----
    - name: Stop existing services
      shell: docker-compose down
      args:
        chdir: "{{ app_dir }}"
      ignore_errors: yes

    - name: Pull latest images
      shell: docker-compose pull
      args:
        chdir: "{{ app_dir }}"
      ignore_errors: yes

    - name: Build and start services
      shell: docker-compose up -d --build
      args:
        chdir: "{{ app_dir }}"
      register: compose_result

    - name: Show compose output
      debug:
        var: compose_result.stdout_lines

    # ---- Health Checks ----
    - name: Wait for services to start
      pause:
        seconds: 15

    - name: Verify fitness service health
      uri:
        url: "http://localhost:3001/health"
        status_code: 200
      retries: 5
      delay: 5
      register: fitness_health

    - name: Verify merchant service health
      uri:
        url: "http://localhost:3002/health"
        status_code: 200
      retries: 5
      delay: 5

    - name: Verify geo service health
      uri:
        url: "http://localhost:3003/health"
        status_code: 200
      retries: 5
      delay: 5

    - name: Verify rewards service health
      uri:
        url: "http://localhost:3004/health"
        status_code: 200
      retries: 5
      delay: 5

    - name: All services healthy
      debug:
        msg: "✅ All CampusQuest Go services are running!"

    # ---- Systemd Auto-Startup ----
    - name: Create systemd service for auto-startup
      copy:
        content: |
          [Unit]
          Description=CampusQuest Go Application
          Requires=docker.service
          After=docker.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          WorkingDirectory={{ app_dir }}
          ExecStart=/usr/local/bin/docker-compose up -d
          ExecStop=/usr/local/bin/docker-compose down
          TimeoutStartSec=0
          User={{ ansible_user }}

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/campusquest-go.service
        mode: '0644'

    - name: Enable and start systemd service
      systemd:
        name: campusquest-go
        enabled: yes
        daemon_reload: yes

    # ---- Log Rotation ----
    - name: Configure log rotation
      copy:
        content: |
          {{ app_dir }}/*.log {
              daily
              rotate 7
              compress
              missingok
              notifempty
          }
        dest: /etc/logrotate.d/campusquest-go
        mode: '0644'

    # ---- Automated Backups ----
    - name: Create backup script
      copy:
        content: |
          #!/bin/bash
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="{{ backup_dir }}/backup_${TIMESTAMP}.sql"
          docker exec campusquest_db pg_dump -U {{ db_user }} {{ db_name }} > "$BACKUP_FILE"
          gzip "$BACKUP_FILE"
          # Keep only last 7 days of backups
          find {{ backup_dir }} -name "*.sql.gz" -mtime +7 -delete
          echo "Backup completed: ${BACKUP_FILE}.gz"
        dest: /usr/local/bin/campusquest-backup.sh
        mode: '0755'
        owner: "{{ ansible_user }}"

    - name: Schedule daily database backup at 2 AM
      cron:
        name: "CampusQuest Go DB Backup"
        minute: "0"
        hour: "2"
        job: "/usr/local/bin/campusquest-backup.sh >> /var/log/campusquest-backup.log 2>&1"
        user: "{{ ansible_user }}"

    # ---- Summary ----
    - name: Deployment summary
      debug:
        msg: |
          ============================================
          ✅ CampusQuest Go Deployment Complete!
          ============================================
          Environment: {{ deployment_env }}
          App Directory: {{ app_dir }}
          Services:
            - Frontend:  http://localhost:3000
            - Fitness:   http://localhost:3001
            - Merchant:  http://localhost:3002
            - Geo:       http://localhost:3003
            - Rewards:   http://localhost:3004
          Database: PostgreSQL on port 5432
          Backups: Daily at 2 AM → {{ backup_dir }}
          ============================================
